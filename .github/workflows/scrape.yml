name: daily-scrape
on:
  schedule:
    - cron: "5 21 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r collector/requirements.txt
      - name: install chromium (headless 폴백)
        run: python -m playwright install --with-deps chromium
      - run: python collector/collector.py
      - name: rebuild site data (cards.json 연회비 병합)
        run: python build_data.py || echo "build_data 실패 - 기존 데이터 유지"
      - name: commit & push
        run: |
          git config user.name  "cardtyranno-bot"
          git config user.email "bot@cardtyranno.com"
          git add -A site collector/meta.db || true
          if git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          git commit -m "daily scrape $(date -u +%F)"
          for i in 1 2 3; do
            git pull --no-rebase -X ours --no-edit origin main && git push && break || (echo "재시도 $i"; sleep 5)
          done
