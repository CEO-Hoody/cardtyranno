name: daily-scrape
on:
  schedule:
    - cron: "5 21 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r collector/requirements.txt
      - run: python collector/collector.py
      - name: commit & push
        run: |
          git config user.name  "cardtyranno-bot"
          git config user.email "bot@cardtyranno.com"
          git add -A site collector/meta.db || true
          git diff --cached --quiet || (git commit -m "daily scrape $(date -u +%F)" && git push)
