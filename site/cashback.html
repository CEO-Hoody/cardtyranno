<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>이번 달 카드 캐시백 전체 | 카드티라노</title>
<meta name="description" content="카드고릴라·뱅크샐러드·토스 등에서 수집한 이번 달 신용카드 캐시백 발급 이벤트를 한눈에 비교. 카드티라노 콜렉터가 매일 자동 수집·갱신합니다."/>
<style>
:root{--bg:#0c0d10;--card:#16181d;--card2:#1d2026;--line:#262a31;--tx:#e8eaed;--mut:#9aa0a8;--ac:#19c37d;--ac2:#36d399;--gold:#f5b301}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
header{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:8px 0 4px}
h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.02em}
.tag{font-size:12px;color:var(--ac2);font-weight:700}
.sub{color:var(--mut);font-size:13px;margin:6px 0 18px;line-height:1.6}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.bar input{flex:1;min-width:180px;background:var(--card);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:11px 13px;font-size:14px;outline:none}
.bar input:focus{border-color:var(--ac)}
.chip{font-size:12px;color:var(--mut);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 12px;cursor:pointer;user-select:none}
.chip.on{color:#0c0d10;background:var(--ac);border-color:var(--ac);font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:12px}
.c{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;transition:border-color .15s}
.c:hover{border-color:#3a4150}
.iss{font-size:11px;color:var(--mut);font-weight:600}
.nm{font-size:15px;font-weight:700;line-height:1.35;letter-spacing:-.01em}
.rw{font-size:19px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
.rw small{font-size:12px;color:var(--mut);font-weight:600;margin-left:4px}
.plats{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.pl{font-size:11px;font-weight:700;border-radius:9px;padding:5px 9px 5px 5px;display:inline-flex;gap:6px;align-items:center;color:#fff;line-height:1;text-decoration:none;transition:filter .15s}
.pl:hover{filter:brightness(1.08)}
.pl .mk{width:17px;height:17px;border-radius:5px;background:rgba(255,255,255,.22);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
.pl .amt{font-weight:600;opacity:.92}
.pl.cardgorilla{background:#0AC15B}
.pl.banksalad{background:#2A6FF3}
.pl.toss{background:#0064FF}
.pl.naver{background:#03C75A}
.pl.ajungdang{background:#2563EB}
.cnt{color:var(--mut);font-size:12px;margin:2px 0 14px}
footer{color:var(--mut);font-size:12px;margin-top:30px;line-height:1.7;border-top:1px solid var(--line);padding-top:16px}
.empty{color:var(--mut);padding:40px 0;text-align:center}
</style></head>
<body><div class="wrap">
<header><h1>이번 달 카드 캐시백</h1><span class="tag" id="month">·</span></header>
<div class="sub">카드고릴라·뱅크샐러드·토스 등에서 수집한 <b>발급 시 캐시백 이벤트</b>를 카드별로 비교합니다. 콜렉터가 매일 자동 수집·변경감지합니다. 금액은 각 플랫폼이 안내한 최대 캐시백 기준입니다.</div>
<div class="bar">
  <input id="q" placeholder="카드명·카드사 검색 (예: 현대, LIKIT, 트래블)"/>
  <span class="chip on" data-f="all">전체</span>
  <span class="chip" data-f="multi">교차비교</span>
</div>
<div class="cnt" id="cnt"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">표시할 캐시백 카드가 없습니다.</div>
<footer>
  데이터 출처: 각 카드 중개 플랫폼 공개 페이지. 사실 정보(캐시백 금액·기간)만 수집하며 소개 문구는 게재하지 않습니다.<br/>
  카드티라노 · 매일 자동 갱신 · <span id="upd"></span>
</footer>
</div>
<script>
const won=n=>{if(!n)return null;if(n>=10000)return (Math.round(n/1000)/10).toString().replace(/\.0$/,'')+'만원';return n.toLocaleString()+'원';};
const PLAT={cardgorilla:{name:'카드고릴라',mk:'G'},banksalad:{name:'뱅크샐러드',mk:'b'},toss:{name:'toss',mk:'t'},naver:{name:'네이버페이',mk:'N'},ajungdang:{name:'아정당',mk:'아'}};
let DATA=[],filter='all';
function maxReward(p){let m=0,t=null;(p.events||[]).forEach(e=>{if((e.reward_won||0)>m){m=e.reward_won;t=e.reward_text;}});return{won:m,text:t};}
function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  let rows=DATA.filter(p=>(p.events||[]).length);
  if(filter==='multi')rows=rows.filter(p=>new Set((p.events||[]).map(e=>e.platform)).size>1);
  if(q)rows=rows.filter(p=>(p.name+' '+(p.issuer||'')).toLowerCase().includes(q));
  rows.forEach(p=>p._m=maxReward(p));
  rows.sort((a,b)=>(b._m.won||0)-(a._m.won||0));
  const g=document.getElementById('grid');g.innerHTML='';
  document.getElementById('cnt').textContent=rows.length+'개 카드';
  document.getElementById('empty').style.display=rows.length?'none':'block';
  rows.forEach(p=>{
    const m=p._m;const pf=p.platforms||{};
    const plats=(p.events||[]).map(e=>{const u=(pf[e.platform]||{}).url;const P=PLAT[e.platform]||{name:e.platform,mk:'·'};const r=won(e.reward_won);
      const inner='<span class="mk">'+P.mk+'</span><span>'+P.name+'</span>'+(r?'<span class="amt">'+r+'</span>':'');
      const cls='pl '+e.platform;
      return u?'<a class="'+cls+'" href="'+u+'" target="_blank" rel="noopener">'+inner+'</a>':'<span class="'+cls+'">'+inner+'</span>';}).join('');
    const el=document.createElement('div');el.className='c';
    el.innerHTML='<div class="iss">'+(p.issuer||'')+'</div>'+
      '<div class="nm">'+p.name+'</div>'+
      (m.won?'<div class="rw">최대 '+won(m.won)+'<small>캐시백</small></div>':'')+
      '<div class="plats">'+plats+'</div>';
    g.appendChild(el);
  });
}
fetch('./platform_events.json?t='+Date.now()).then(r=>r.json()).then(j=>{
  DATA=j.products||[];
  document.getElementById('month').textContent=(j.month||'')+' 기준';
  document.getElementById('upd').textContent='업데이트 '+(j.updated||j.month||'');
  render();
}).catch(e=>{document.getElementById('empty').style.display='block';document.getElementById('empty').textContent='데이터를 불러오지 못했습니다.';});
document.getElementById('q').addEventListener('input',render);
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filter=c.dataset.f;render();}));
</script>
</body></html>
